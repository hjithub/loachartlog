<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoA Craft Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0c0f1a;
      color: #c8cdd8;
      min-height: 100vh;
    }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    /* Header */
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 {
      font-size: 1.4em; font-weight: 700; color: #fff;
      letter-spacing: -0.02em;
    }
    .header h1 span { color: #f0b232; }
    .updated { color: #555; font-size: 0.75em; margin-top: 4px; }

    /* Config bar */
    .config-bar {
      display: flex; gap: 16px; align-items: center; justify-content: center;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .config-bar label {
      font-size: 0.8em; color: #666; display: flex; align-items: center; gap: 6px;
    }
    .config-bar input {
      width: 85px; background: #161b2e; border: 1px solid #2a3050;
      color: #e0e0e0; padding: 6px 8px; border-radius: 6px; font-size: 0.85em;
      font-family: inherit;
    }
    .config-bar input:focus { outline: none; border-color: #f0b232; }

    /* Hero recommendation card */
    .hero {
      background: linear-gradient(135deg, #141929 0%, #1a2040 100%);
      border: 1px solid #252d48; border-radius: 16px;
      padding: 28px 24px; margin-bottom: 20px; text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(240,178,50,0.04) 0%, transparent 60%);
    }
    .hero .label { font-size: 0.75em; color: #f0b232; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
    .hero .amount {
      font-size: 2.8em; font-weight: 700; color: #4ade80;
      margin: 4px 0; letter-spacing: -0.03em;
    }
    .hero .versus { font-size: 0.8em; color: #555; }
    .hero .versus strong { color: #888; }

    /* Two-column layout */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

    /* Cards */
    .card {
      background: #141929; border: 1px solid #1e2540; border-radius: 12px;
      padding: 16px; margin-bottom: 12px;
    }
    .card h3 {
      font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.08em;
      color: #f0b232; margin-bottom: 12px; font-weight: 600;
    }

    /* Tables */
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.05em;
      color: #556; padding: 6px 8px; text-align: left; font-weight: 600;
      border-bottom: 1px solid #1e2540;
    }
    td {
      padding: 8px; font-size: 0.82em; border-bottom: 1px solid #151a2d;
      font-variant-numeric: tabular-nums;
    }
    tr:hover td { background: rgba(240,178,50,0.03); }
    tr.profitable td:first-child { border-left: 3px solid #4ade80; }
    tr.loss td:first-child { border-left: 3px solid #ef4444; }
    tr.profitable .val { color: #4ade80; }
    tr.loss .val { color: #ef4444; }
    td.name-cell { color: #e0e0e0; font-weight: 500; }

    /* Plan table */
    .plan-table td { color: #c8cdd8; }
    .plan-table td:last-child { color: #4ade80; font-weight: 600; }
    .plan-table tr:last-child td { color: #f0b232; font-weight: 600; border-top: 1px solid #2a3050; }

    /* Mat lists */
    .mat-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
    .mat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; background: #0f1322; border-radius: 8px;
      font-size: 0.82em;
    }
    .mat-row .mname { color: #999; }
    .mat-row .mval { font-weight: 600; font-variant-numeric: tabular-nums; }
    .mat-row .mval.buy { color: #f87171; }
    .mat-row .mval.sell { color: #4ade80; }

    /* Price grid */
    .price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; }
    .price-card {
      background: #0f1322; border-radius: 10px; padding: 10px;
      display: flex; align-items: center; gap: 10px;
      border: 1px solid transparent; transition: border-color 0.2s;
    }
    .price-card:hover { border-color: #2a3050; }
    .price-card img { width: 36px; height: 36px; border-radius: 6px; background: #1a2040; }
    .price-card .pname { font-size: 0.75em; color: #777; }
    .price-card .pprice { font-size: 1em; color: #f0b232; font-weight: 700; }
    .price-card .pbundle { font-size: 0.7em; color: #444; }
    .price-card .pavg { font-size: 0.68em; color: #444; }

    /* Empty state */
    .empty { color: #444; font-size: 0.85em; padding: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><span>LoA</span> Craft Calculator</h1>
      <div class="updated" id="updated"></div>
    </div>

    <div class="config-bar">
      <label>Weekly Energy <input type="number" id="weeklyEnergy" value="151200"></label>
      <label>Gather Multi <input type="number" id="gatherMultiplier" value="3.024" step="0.001"></label>
    </div>

    <div class="hero" id="recommendation">
      <div class="label">Loading...</div>
    </div>

    <div class="card">
      <h3>Recipe Profitability</h3>
      <table>
        <thead><tr><th>Recipe</th><th>Cost</th><th>Sell</th><th>Profit</th><th>%</th><th>g/energy</th></tr></thead>
        <tbody id="recipeBody"></tbody>
      </table>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>Craft Plan</h3>
        <div id="planDetails"></div>
      </div>
      <div class="card">
        <h3>Buy These Mats</h3>
        <div class="mat-grid" id="buyMats"></div>
      </div>
    </div>

    <div class="card">
      <h3>Sell Gathered Mats</h3>
      <div class="mat-grid" id="sellMats"></div>
    </div>

    <div class="card">
      <h3>Market Prices</h3>
      <div class="price-grid" id="priceGrid"></div>
    </div>
  </div>

  <script>
    const RECIPES = [
      {
        name: "정령의 회복약", batchSize: 3, energy: 288,
        product: "정령의 회복약",
        materials: [
          { name: "들꽃", qty: 33, bundle: 100 },
          { name: "수줍은 들꽃", qty: 25, bundle: 100 },
          { name: "화사한 들꽃", qty: 8, bundle: 100 },
          { name: "골드", qty: 30, bundle: 1, fixed: true }
        ]
      },
      {
        name: "아드로핀 물약", batchSize: 3, energy: 288,
        product: "아드로핀 물약",
        materials: [
          { name: "고대 유물", qty: 75, bundle: 100, gathered: true },
          { name: "수줍은 들꽃", qty: 8, bundle: 100 },
          { name: "진귀한 유물", qty: 6, bundle: 100, gathered: true },
          { name: "희귀한 유물", qty: 17, bundle: 100, gathered: true },
          { name: "골드", qty: 30, bundle: 1, fixed: true }
        ]
      },
      {
        name: "빛나는 성스러운 부적", batchSize: 2, energy: 216,
        product: "빛나는 성스러운 부적",
        materials: [
          { name: "단단한 철광석", qty: 4, bundle: 100 },
          { name: "성스러운 부적", qty: 3, bundle: 1 },
          { name: "골드", qty: 15, bundle: 1, fixed: true }
        ]
      },
      {
        name: "회오리 수류탄", batchSize: 3, energy: 144,
        product: "회오리 수류탄",
        materials: [
          { name: "목재", qty: 17, bundle: 100 },
          { name: "부드러운 목재", qty: 12, bundle: 100 },
          { name: "튼튼한 목재", qty: 4, bundle: 100 },
          { name: "골드", qty: 15, bundle: 1, fixed: true }
        ]
      },
      {
        name: "암흑 수류탄", batchSize: 3, energy: 144,
        product: "암흑 수류탄",
        materials: [
          { name: "목재", qty: 17, bundle: 100 },
          { name: "부드러운 목재", qty: 12, bundle: 100 },
          { name: "튼튼한 목재", qty: 4, bundle: 100 },
          { name: "골드", qty: 15, bundle: 1, fixed: true }
        ]
      },
      {
        name: "상급 아비도스 융화 재료(고고학)", batchSize: 10, energy: 360,
        product: "상급 아비도스 융화 재료",
        materials: [
          { name: "고대 유물", qty: 112, bundle: 100, gathered: true },
          { name: "아비도스 유물", qty: 43, bundle: 100, gathered: true },
          { name: "희귀한 유물", qty: 59, bundle: 100, gathered: true },
          { name: "골드", qty: 520, bundle: 1, fixed: true }
        ]
      },
      {
        name: "아비도스 융화 재료(고고학)", batchSize: 10, energy: 288,
        product: "아비도스 융화 재료",
        materials: [
          { name: "고대 유물", qty: 86, bundle: 100, gathered: true },
          { name: "아비도스 유물", qty: 33, bundle: 100, gathered: true },
          { name: "희귀한 유물", qty: 45, bundle: 100, gathered: true },
          { name: "골드", qty: 400, bundle: 1, fixed: true }
        ]
      },
      {
        name: "아비도스 융화 재료(벌목)", batchSize: 10, energy: 288,
        product: "아비도스 융화 재료",
        materials: [
          { name: "목재", qty: 86, bundle: 100 },
          { name: "부드러운 목재", qty: 45, bundle: 100 },
          { name: "아비도스 목재", qty: 33, bundle: 100 },
          { name: "골드", qty: 400, bundle: 1, fixed: true }
        ]
      },
      {
        name: "성스러운 부적", batchSize: 3, energy: 144,
        product: "성스러운 부적",
        materials: [
          { name: "단단한 철광석", qty: 4, bundle: 100 },
          { name: "묵직한 철광석", qty: 14, bundle: 100 },
          { name: "철광석", qty: 28, bundle: 100 },
          { name: "골드", qty: 15, bundle: 1, fixed: true }
        ]
      }
    ];

    const BASE_GATHERING = {
      "고대 유물": 2784, "희귀한 유물": 1641,
      "진귀한 유물": 382, "아비도스 유물": 382
    };

    const TAX_RATE = 0.05;

    function getUnitPrice(prices, name) {
      const p = prices[name];
      if (!p) return 0;
      return p.currentMinPrice / p.bundleCount;
    }

    function calcRecipe(recipe, prices) {
      const sellPrice = prices[recipe.product]?.currentMinPrice || 0;
      const tax = Math.ceil(sellPrice * TAX_RATE);
      const netSell = sellPrice - tax;

      let costPerBatch = 0;
      let costPerBatchFree = 0;
      for (const mat of recipe.materials) {
        if (mat.fixed) {
          const goldCost = Math.ceil(mat.qty * 0.7);
          costPerBatch += goldCost;
          costPerBatchFree += goldCost;
        } else {
          const unitPrice = getUnitPrice(prices, mat.name);
          const matCost = mat.qty * unitPrice;
          costPerBatch += matCost;
          if (!mat.gathered) costPerBatchFree += matCost;
        }
      }

      const costPerUnit = costPerBatch / recipe.batchSize;
      const profitPerUnit = netSell - costPerUnit;
      const profitPerBatch = profitPerUnit * recipe.batchSize;
      const profitPerEnergy = profitPerBatch / recipe.energy;

      const costPerUnitFree = costPerBatchFree / recipe.batchSize;
      const profitPerUnitFree = netSell - costPerUnitFree;
      const profitPerBatchFree2 = profitPerUnitFree * recipe.batchSize;
      const profitPerEnergyFree = profitPerBatchFree2 / recipe.energy;

      return {
        name: recipe.name, sellPrice, tax, netSell,
        costPerUnit: costPerUnit.toFixed(1),
        profitPerUnit: profitPerUnit.toFixed(1),
        marginPct: ((profitPerUnit / costPerUnit) * 100).toFixed(1),
        profitPerEnergy: profitPerEnergy.toFixed(4),
        profitPerEnergyFree: profitPerEnergyFree.toFixed(4),
        profitPerBatch, profitPerBatchFree: profitPerBatchFree2,
        energy: recipe.energy, batchSize: recipe.batchSize,
        materials: recipe.materials,
        hasGathered: recipe.materials.some(m => m.gathered)
      };
    }

    function optimizePlan(recipes, prices, weeklyEnergy, multiplier) {
      const gathered = {};
      for (const [k, v] of Object.entries(BASE_GATHERING))
        gathered[k] = Math.floor(v * multiplier);

      let sellGatheredValue = 0;
      for (const [name, qty] of Object.entries(gathered))
        sellGatheredValue += qty * getUnitPrice(prices, name) * (1 - TAX_RATE);

      const calcs = recipes.map(r => calcRecipe(r, prices));
      const bestNonGathered = calcs
        .filter(c => parseFloat(c.profitPerEnergy) > 0)
        .sort((a, b) => parseFloat(b.profitPerEnergy) - parseFloat(a.profitPerEnergy))[0];

      let stratA = 0, stratAPlan = [];
      if (bestNonGathered) {
        const recipe = recipes.find(r => r.name === bestNonGathered.name);
        const batches = Math.floor(weeklyEnergy / recipe.energy);
        const profit = batches * bestNonGathered.profitPerBatch;
        stratA = profit + sellGatheredValue;
        stratAPlan = [{ name: recipe.name, batches, units: batches * recipe.batchSize, energy: batches * recipe.energy, profit }];
      }

      const gatheredRecipes = calcs.filter(c => c.hasGathered && parseFloat(c.profitPerEnergyFree) > 0)
        .sort((a, b) => parseFloat(b.profitPerEnergyFree) - parseFloat(a.profitPerEnergyFree));

      let stratB = 0, stratBPlan = [], remainEnergy = weeklyEnergy;
      const remainMats = { ...gathered };

      for (const gc of gatheredRecipes) {
        const recipe = recipes.find(r => r.name === gc.name);
        let maxBatches = Math.floor(remainEnergy / recipe.energy);
        for (const mat of recipe.materials)
          if (mat.gathered && remainMats[mat.name] !== undefined)
            maxBatches = Math.min(maxBatches, Math.floor(remainMats[mat.name] / mat.qty));

        if (maxBatches > 0) {
          for (const mat of recipe.materials)
            if (mat.gathered && remainMats[mat.name] !== undefined)
              remainMats[mat.name] -= maxBatches * mat.qty;
          remainEnergy -= maxBatches * recipe.energy;
          const profit = maxBatches * gc.profitPerBatchFree;
          stratB += profit;
          stratBPlan.push({ name: recipe.name, batches: maxBatches, units: maxBatches * recipe.batchSize, energy: maxBatches * recipe.energy, profit });
        }
      }

      let leftoverValue = 0;
      for (const [name, qty] of Object.entries(remainMats))
        if (qty > 0) leftoverValue += qty * getUnitPrice(prices, name) * (1 - TAX_RATE);
      stratB += leftoverValue;

      if (bestNonGathered && remainEnergy > 0) {
        const recipe = recipes.find(r => r.name === bestNonGathered.name);
        const batches = Math.floor(remainEnergy / recipe.energy);
        if (batches > 0) {
          stratB += batches * bestNonGathered.profitPerBatch;
          remainEnergy -= batches * recipe.energy;
          stratBPlan.push({ name: recipe.name, batches, units: batches * recipe.batchSize, energy: batches * recipe.energy, profit: batches * bestNonGathered.profitPerBatch });
        }
      }

      return {
        stratA: { total: stratA, plan: stratAPlan, sellGathered: sellGatheredValue },
        stratB: { total: stratB, plan: stratBPlan, leftoverSell: leftoverValue },
        winner: stratA >= stratB ? 'A' : 'B', calcs
      };
    }

    function getMatsNeeded(plan, recipes, prices) {
      const mats = {};
      for (const item of plan) {
        const recipe = recipes.find(r => r.name === item.name);
        for (const mat of recipe.materials) {
          if (mat.fixed || mat.gathered) continue;
          mats[mat.name] = (mats[mat.name] || 0) + mat.qty * item.batches;
        }
      }
      return mats;
    }

    async function main() {
      let data;
      try {
        const res = await fetch('prices.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch(e) {
        document.getElementById('recommendation').innerHTML =
          `<div class="label">Error</div><div class="amount" style="color:#ef4444;font-size:1.2em">${e.message}</div>`;
        return;
      }
      const prices = data.prices;
      if (!prices || Object.keys(prices).length === 0) {
        document.getElementById('recommendation').innerHTML =
          `<div class="label">No Data</div><div class="amount" style="color:#ef4444;font-size:1em">Run GitHub Action to populate prices</div>`;
        return;
      }

      const ts = new Date(data.updated_at);
      const ago = Math.round((Date.now() - ts.getTime()) / 60000);
      const agoText = ago < 60 ? `${ago}m ago` : `${Math.round(ago/60)}h ago`;
      document.getElementById('updated').textContent = `${ts.toLocaleString('ko-KR')} (${agoText})`;

      const weeklyEnergy = parseInt(document.getElementById('weeklyEnergy').value) || 151200;
      const multiplier = parseFloat(document.getElementById('gatherMultiplier').value) || 3.024;
      const result = optimizePlan(RECIPES, prices, weeklyEnergy, multiplier);

      // Hero
      const win = result.winner === 'A' ? result.stratA : result.stratB;
      const lose = result.winner === 'A' ? result.stratB : result.stratA;
      const diff = Math.round(win.total - lose.total);
      document.getElementById('recommendation').innerHTML = `
        <div class="label">Optimal Strategy ${result.winner}</div>
        <div class="amount">${Math.round(win.total).toLocaleString()}g</div>
        <div class="versus">vs <strong>${Math.round(lose.total).toLocaleString()}g</strong> (Strategy ${result.winner === 'A' ? 'B' : 'A'}) &mdash; +${diff.toLocaleString()}g difference</div>
      `;

      // Recipe table
      const tbody = document.getElementById('recipeBody');
      tbody.innerHTML = '';
      const sorted = result.calcs.sort((a, b) => parseFloat(b.profitPerEnergy) - parseFloat(a.profitPerEnergy));
      for (const c of sorted) {
        const cls = parseFloat(c.profitPerUnit) > 0 ? 'profitable' : 'loss';
        tbody.innerHTML += `<tr class="${cls}">
          <td class="name-cell">${c.name}</td>
          <td class="val">${c.costPerUnit}</td>
          <td class="val">${c.netSell}</td>
          <td class="val">${c.profitPerUnit}</td>
          <td class="val">${c.marginPct}%</td>
          <td class="val">${c.profitPerEnergy}</td>
        </tr>`;
      }

      // Plan
      const plan = win.plan;
      let planHTML = '<table class="plan-table"><thead><tr><th>Recipe</th><th>Batches</th><th>Units</th><th>Energy</th><th>Profit</th></tr></thead><tbody>';
      for (const p of plan)
        planHTML += `<tr><td>${p.name}</td><td>${p.batches}</td><td>${p.units.toLocaleString()}</td><td>${p.energy.toLocaleString()}</td><td>${Math.round(p.profit).toLocaleString()}g</td></tr>`;
      if (result.winner === 'A')
        planHTML += `<tr><td colspan="4">Sell gathered mats</td><td>${Math.round(win.sellGathered).toLocaleString()}g</td></tr>`;
      else if (win.leftoverSell > 0)
        planHTML += `<tr><td colspan="4">Sell leftover mats</td><td>${Math.round(win.leftoverSell).toLocaleString()}g</td></tr>`;
      planHTML += '</tbody></table>';
      document.getElementById('planDetails').innerHTML = planHTML;

      // Buy mats
      const matsNeeded = getMatsNeeded(plan, RECIPES, prices);
      const buyDiv = document.getElementById('buyMats');
      const buyEntries = Object.entries(matsNeeded).sort((a, b) => a[0].localeCompare(b[0]));
      if (buyEntries.length === 0) {
        buyDiv.innerHTML = '<div class="empty">No mats to buy</div>';
      } else {
        buyDiv.innerHTML = buyEntries.map(([name, qty]) => {
          const cost = Math.round(qty * getUnitPrice(prices, name));
          return `<div class="mat-row"><span class="mname">${name}</span><span class="mval buy">${qty.toLocaleString()} &middot; ${cost.toLocaleString()}g</span></div>`;
        }).join('');
      }

      // Sell mats
      const sellDiv = document.getElementById('sellMats');
      const gathered = {};
      for (const [k, v] of Object.entries(BASE_GATHERING))
        gathered[k] = Math.floor(v * multiplier);

      if (result.winner === 'A') {
        sellDiv.innerHTML = Object.entries(gathered).map(([name, qty]) => {
          const val = Math.round(qty * getUnitPrice(prices, name) * 0.95);
          return `<div class="mat-row"><span class="mname">${name} &times; ${qty.toLocaleString()}</span><span class="mval sell">${val.toLocaleString()}g</span></div>`;
        }).join('');
      } else {
        sellDiv.innerHTML = '<div class="empty">Using gathered mats for crafting</div>';
      }

      // Price grid
      const grid = document.getElementById('priceGrid');
      grid.innerHTML = Object.entries(prices).sort((a, b) => a[0].localeCompare(b[0])).map(([name, info]) => {
        const bundle = info.bundleCount > 1 ? `<span class="pbundle">/ ${info.bundleCount}</span>` : '';
        return `<div class="price-card">
          <img src="${info.icon}" alt="${name}" loading="lazy">
          <div>
            <div class="pname">${name}</div>
            <div class="pprice">${info.currentMinPrice}g ${bundle}</div>
            <div class="pavg">avg ${info.yDayAvgPrice}g</div>
          </div>
        </div>`;
      }).join('');
    }

    document.getElementById('weeklyEnergy').addEventListener('change', main);
    document.getElementById('gatherMultiplier').addEventListener('change', main);
    main();
  </script>
</body>
</html>
